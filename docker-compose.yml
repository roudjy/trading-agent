# ============================================================
# DOCKER COMPOSE - START ALLES MET ÉÉN COMMANDO
# ============================================================
# Gebruik: docker compose up -d
# Stop:    docker compose down
# Logs:    docker compose logs -f agent
#
# Productie (VPS): voeg docker-compose.prod.yml toe zodat
# GHCR images worden gepulld i.p.v. lokaal gebouwd.
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# v3.10 wijzigingen:
# - nginx reverse proxy bindt host :8050; dashboard is intern.
# - ./state bind-mount behoudt session/operator secrets.
# - Geen watchtower. Geen compose-scheduler (systemd-timer op de
#   VPS, zie ops/systemd/).

services:

  # De trading agent zelf
  agent:
    build: .
    container_name: jvr_trading_agent
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"       # Herstart automatisch na crash of VPS reboot
    volumes:
      - ./logs:/app/logs           # Logs bewaren buiten de container
      - ./reports:/app/reports     # Rapporten bewaren
      - ./config:/app/config       # Config aanpasbaar zonder rebuild
      - ./state:/app/state         # v3.10: session/operator secrets bewaren
      - ./research:/app/research   # v3.15.14: campaign launcher must read sprint registry + write registry/queue/ledger artifacts to the same persistent volume the dashboard reads
    environment:
      - TZ=Europe/Amsterdam        # Nederlandse tijdzone
      - PYTHONPATH=/app            # absolute imports (data.contracts, reporting.*) werken als script
      - POLYMARKET_PRIVATE_KEY
      - POLYMARKET_PRIVATE_KEY_FILE
      - POLYMARKET_ALCHEMY_RPC_URL
      - POLYMARKET_ALCHEMY_RPC_URL_FILE
      - POLYMARKET_PROXY_WALLET
      - POLYMARKET_PROXY_WALLET_FILE
    networks:
      - agent_netwerk

  # Het dashboard (Flask backend + React SPA bundle)
  dashboard:
    build: .
    container_name: jvr_dashboard
    command: python -m dashboard.dashboard
    restart: unless-stopped
    expose:
      - "8050"                     # v3.10: enkel intern bereikbaar; nginx praat er mee
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./config:/app/config
      - ./state:/app/state         # v3.10: session/operator secrets bewaren
      - ./research:/app/research   # run-meta + report artifacts adjacent to the frozen contract
    environment:
      - TZ=Europe/Amsterdam
      - PYTHONPATH=/app            # absolute imports (data.contracts, reporting.*) werken als script
    networks:
      - agent_netwerk
    depends_on:
      - agent

  # nginx reverse proxy — anti-indexing + AI-crawler UA block.
  # Terminates host :8050 en proxyt naar dashboard:8050 intern.
  qre-research-supervisor:
    build: .
    container_name: jvr_qre_research_supervisor
    command:
      - python
      - -m
      - reporting.qre_research_supervisor
      - --loop
      - --interval-seconds
      - "300"
      - --max-iterations
      - "24"
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./config:/app/config
      - ./state:/app/state
      - ./research:/app/research
      - ./generated_research:/app/generated_research
      - ./data/cache:/app/data/cache
      - ./artifacts/cache:/app/artifacts/cache
    environment:
      - TZ=Europe/Amsterdam
      - PYTHONPATH=/app
    networks:
      - agent_netwerk
    healthcheck:
      test:
        - CMD
        - python
        - -m
        - reporting.qre_research_supervisor
        - --healthcheck
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: jvr_nginx
    restart: unless-stopped
    ports:
      - "8050:80"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ops/nginx/robots.txt:/usr/share/nginx/html/robots.txt:ro
    networks:
      - agent_netwerk
    depends_on:
      - dashboard

networks:
  agent_netwerk:
    driver: bridge

volumes:
  logs:
  reports:
