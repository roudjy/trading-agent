name: Observe v3.15.16 Intelligent Routing (advisory)

# v3.15.16 — observation-only workflow_dispatch surface.
#
# Purpose:
#   Run the already-merged advisory reporting CLIs on the VPS where
#   the upstream research artifacts exist, then upload the two
#   resulting JSON files as workflow artifacts so the operator can
#   inspect the v3.15.16 advisory Intelligent Routing Layer against
#   real input.
#
# Hard guarantees (mirrored from scripts/deploy_vps_dashboard.sh
# governance posture and the v3.15.16 release framing):
#
#   * workflow_dispatch only. No push/pull_request/schedule trigger.
#   * Zero workflow inputs. No operator-supplied tokens, branches,
#     paths, or commands. The remote script is hard-coded inline.
#   * No campaign launcher, research generation, run_research,
#     docker compose, deploy script, broker, live/paper/shadow/
#     trading/risk/execution, dashboard or nginx restart.
#   * The remote CLIs are stdlib-only and write only into
#     ``logs/intelligent_routing/latest.json`` and
#     ``logs/intelligent_routing_status/latest.json``.
#   * Frozen contracts (``research/research_latest.json`` and
#     ``research/strategy_matrix.csv``) are sha256-pinned BEFORE
#     and AFTER the CLI run; any drift fails the job.
#   * Tracked-file changes during the run fail the job.
#   * Any untracked file outside the two allowed log directories
#     fails the job.
#   * The runner uploads exactly the two log files plus the raw
#     remote stdout transcript as the workflow artifact for audit.
#   * Secrets (VPS_HOST / VPS_USER / VPS_SSH_KEY) are referenced via
#     ${{ secrets.* }} only; never echoed; never printed.
#   * SHA-pinned third-party actions per
#     docs/governance/sha_pin_review.md.
#
# Why a separate workflow (not added to deploy-vps-dashboard.yml):
#   The deploy workflow's posture is "deploy on push to main only,
#   no manual escape hatch". Adding observation to it would widen
#   that surface. A standalone workflow_dispatch entry point keeps
#   the deploy posture intact and the observation posture explicit.
#
# Companion runbook: docs/governance/intelligent_routing_observation.md
# Related modules:    reporting/intelligent_routing.py,
#                     reporting/intelligent_routing_status.py
# Release framing:    routing_effect = "advisory_only"
#                     queue_ordering_effect = "none"

on:
  workflow_dispatch:
    # Intentionally no inputs. The workflow is parameter-free by
    # design. A future change that adds inputs MUST land in a new
    # governance-bootstrap PR.

concurrency:
  group: observe-intelligent-routing
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  observe:
    name: Observe Intelligent Routing artifact on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo (runner-side context only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Shallow checkout is fine — the observation work runs on
          # the VPS, not on this runner. We only need this checkout
          # so the runner has a workspace for the upload-artifact
          # step.
          fetch-depth: 1

      - name: Configure SSH client
        env:
          # Pulled via env so the values never appear in the
          # workflow's shell trace.
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_HOST}" ] || [ -z "${VPS_USER}" ] || [ -z "${VPS_SSH_KEY}" ]; then
            echo "missing one or more required secrets: VPS_HOST / VPS_USER / VPS_SSH_KEY"
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Write the private key without placing the value on a
          # command line where another process could observe it.
          umask 077
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/observe_key
          chmod 600 ~/.ssh/observe_key
          # Pin the host key. ssh-keyscan is silent on stderr to
          # avoid leaking VPS_HOST to logs.
          ssh-keyscan -H -T 10 "${VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts
          echo "ssh client configured (key + known_hosts)"

      - name: Run observation on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          # Single fixed SSH command. The remote script is hard-coded
          # inline via a quoted heredoc so no expansion happens on the
          # runner. The remote bash is invoked via ``bash -s`` so it
          # reads the script from stdin; we pass NO arguments.
          ssh \
            -i ~/.ssh/observe_key \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "${VPS_USER}@${VPS_HOST}" \
            'bash -s' > artifacts/remote_stdout.txt << 'REMOTE_EOF'
          set -euo pipefail
          cd /root/trading-agent

          # Bootstrap to main (mirror deploy-vps-dashboard pattern).
          # If this first observation lands before the workflow file
          # is on the VPS, the fetch+reset is what brings it in.
          git fetch origin main >/dev/null
          git reset --hard origin/main >/dev/null

          # Pre-snapshot frozen contracts.
          echo "FROZEN_BEFORE_BEGIN"
          for f in research/research_latest.json research/strategy_matrix.csv; do
            if [ -f "$f" ]; then
              printf '%s  %s\n' "$(sha256sum "$f" | cut -d ' ' -f 1)" "$f"
            else
              printf 'absent  %s\n' "$f"
            fi
          done
          echo "FROZEN_BEFORE_END"

          # Pre-CLI git status snapshot. The VPS is a live system
          # and will legitimately have untracked-non-ignored files
          # under research/campaigns/, research/discovery_sprints/,
          # etc. that the trading agent has produced. We do NOT
          # demand a clean tree; we demand only that the observation
          # introduces no NEW untracked entries outside the two
          # allowed log directories.
          echo "GIT_STATUS_PRE_BEGIN"
          pre_status="$(git status --short || true)"
          printf '%s\n' "${pre_status}"
          echo "GIT_STATUS_PRE_END"

          # Run the advisory CLIs. Both are stdlib-only and write
          # only inside logs/intelligent_routing[_status]/.
          python3 -m reporting.intelligent_routing --write > /dev/null
          python3 -m reporting.intelligent_routing_status --write > /dev/null

          # Metadata-shape diagnostic. Reads the upstream registry and
          # queue artifacts read-only and writes a sanitized summary
          # (top-level keys + first three records' key-sets + scalar
          # presence flags) to logs/intelligent_routing/metadata_shape_
          # diagnostic.json. Truncates every value to a short scalar
          # preview; never echoes the full payload; never prints
          # secrets. Pure stdlib.
          python3 - <<'PY'
          import json
          from pathlib import Path

          OUT = Path("logs/intelligent_routing/metadata_shape_diagnostic.json")
          OUT.parent.mkdir(parents=True, exist_ok=True)
          REGISTRY = Path("research/campaign_registry_latest.v1.json")
          QUEUE = Path("research/campaign_queue_latest.v1.json")
          MAX_PREVIEW = 80

          def preview(v):
              if v is None:
                  return None
              if isinstance(v, (bool, int, float)):
                  return v
              if isinstance(v, str):
                  return v if len(v) <= MAX_PREVIEW else v[:MAX_PREVIEW] + "…"
              if isinstance(v, (list, tuple)):
                  return f"<{type(v).__name__} len={len(v)}>"
              if isinstance(v, dict):
                  return f"<dict keys={sorted(v)[:8]}>"
              return f"<{type(v).__name__}>"

          def load(path):
              if not path.exists():
                  return None
              try:
                  data = json.loads(path.read_text(encoding="utf-8"))
              except json.JSONDecodeError:
                  return None
              return data if isinstance(data, dict) else None

          probe_keys = [
              "campaign_id", "preset_name", "preset", "strategy",
              "strategy_name", "strategy_family", "family",
              "asset_class", "timeframe", "interval", "symbol",
              "universe", "extra", "metadata", "params",
              "input_artifact_fingerprint", "hypothesis_id",
          ]

          def record_probe(rec):
              out = {"keys": sorted(rec.keys())}
              found = {}
              for k in probe_keys:
                  if k in rec:
                      found[k] = preview(rec[k])
              out["probe_fields_present"] = found
              out["probe_fields_missing"] = sorted(
                  k for k in probe_keys if k not in rec
              )
              extra = rec.get("extra")
              if isinstance(extra, dict):
                  out["extra_keys"] = sorted(extra.keys())
                  out["extra_probe"] = {
                      k: preview(extra[k]) for k in probe_keys if k in extra
                  }
              return out

          summary = {
              "schema_version": "1.0",
              "report_kind": "intelligent_routing_metadata_shape_diagnostic",
              "campaign_registry": {"status": "absent"},
              "campaign_queue": {"status": "absent"},
              "campaign_id_encoding_hint": (
                  "campaign_id format from build_campaign_id() is "
                  "col-{ts}-{preset_name}-{nonce10}; preset_name embeds "
                  "asset_class and timeframe by convention "
                  "(e.g. trend_equities_4h_baseline -> equities/4h)."
              ),
          }

          reg = load(REGISTRY)
          if reg is not None:
              top_keys = sorted(reg.keys())
              campaigns = reg.get("campaigns")
              shape = (
                  "dict" if isinstance(campaigns, dict)
                  else ("list" if isinstance(campaigns, list)
                        else type(campaigns).__name__)
              )
              record_count = (
                  len(campaigns) if isinstance(campaigns, (dict, list))
                  else 0
              )
              first_three = []
              if isinstance(campaigns, dict):
                  cids = sorted(campaigns.keys())[:3]
                  for cid in cids:
                      rec = campaigns[cid]
                      if isinstance(rec, dict):
                          probe = record_probe(rec)
                          probe["campaign_id_from_index"] = cid
                          first_three.append(probe)
              elif isinstance(campaigns, list):
                  for rec in campaigns[:3]:
                      if isinstance(rec, dict):
                          first_three.append(record_probe(rec))
              summary["campaign_registry"] = {
                  "status": "present",
                  "top_level_keys": top_keys,
                  "campaigns_value_type": shape,
                  "campaigns_record_count": record_count,
                  "first_three_records": first_three,
              }

          q = load(QUEUE)
          if q is not None:
              top_keys = sorted(q.keys())
              entries = q.get("queue")
              shape = type(entries).__name__
              entry_count = len(entries) if isinstance(entries, list) else 0
              first_three = []
              if isinstance(entries, list):
                  for entry in entries[:3]:
                      if isinstance(entry, dict):
                          out = {"keys": sorted(entry.keys())}
                          out["scalar_preview"] = {
                              k: preview(entry[k]) for k in entry
                              if k in (
                                  "campaign_id", "priority_tier",
                                  "spawned_at_utc", "state",
                              )
                          }
                          first_three.append(out)
              summary["campaign_queue"] = {
                  "status": "present",
                  "top_level_keys": top_keys,
                  "queue_value_type": shape,
                  "queue_entry_count": entry_count,
                  "first_three_entries": first_three,
              }

          OUT.write_text(
              json.dumps(summary, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(f"wrote: {OUT}")
          PY

          # v3.15.16.2.diag — IG-ledger-shape diagnostic. Streams the
          # append-only campaign-evidence ledger line-by-line and
          # emits a sanitized summary (counters + key sets + mapping-
          # evidence counts only — NEVER full event bodies, NEVER
          # secrets, NEVER raw nested payloads). Output is a single
          # new file under the existing log directory:
          # logs/intelligent_routing/ig_ledger_shape_diagnostic.json.
          # Pure stdlib; bounded memory; bounded line scan.
          #
          # v3.15.16.2.diag.1 — corrected ledger path. The previous
          # diagnostic targeted ``research/campaign_evidence_ledger.jsonl``
          # which does NOT exist on the VPS (verified empirically by
          # the prior diagnostic run; PR #127 / merge 4dcd5460). The
          # canonical writer lives at
          # ``research/campaign_evidence_ledger_latest.v1.jsonl`` per
          # research/campaign_launcher.py:146 and
          # research/diagnostics/paths.py:169 (CAMPAIGN_EVIDENCE_LEDGER_PATH).
          # The literal corrected path is used here so the diagnostic
          # is fully self-contained and never imports research modules.
          python3 - <<'PY'
          import json
          from collections import Counter
          from pathlib import Path

          OUT = Path("logs/intelligent_routing/ig_ledger_shape_diagnostic.json")
          OUT.parent.mkdir(parents=True, exist_ok=True)
          LEDGER = Path("research/campaign_evidence_ledger_latest.v1.jsonl")
          MAX_LINES = 1_000_000

          # Probe field-name vocabularies (closed). The presence of
          # each name is a hint about the producer's schema; the
          # diagnostic does NOT decide a final reader contract.
          PROBE_CID_FIELDS = (
              "campaign_id", "col_campaign_id", "run_campaign_id",
          )
          PROBE_SCORE_FIELDS = (
              "score", "ig_score", "information_gain_score",
              "info_gain_score", "ig", "weight",
          )
          PROBE_BUCKET_FIELDS = (
              "bucket", "ig_bucket", "information_gain_bucket",
              "info_gain_bucket",
          )
          PROBE_TS_FIELDS = (
              "at_utc", "timestamp", "timestamp_utc",
              "event_at_utc", "ts_utc", "occurred_at_utc",
          )

          line_count = 0
          parsed_line_count = 0
          malformed_line_count = 0
          truncated = False
          event_type_counter: Counter = Counter()
          meaningful_counter: Counter = Counter()
          outcome_counter: Counter = Counter()
          reason_code_counter: Counter = Counter()
          events_per_campaign: Counter = Counter()
          ig_relevant_per_campaign: set = set()
          ig_relevant_event_count = 0
          oldest_at = None
          newest_at = None
          missing_at_utc_count = 0
          malformed_at_utc_count = 0
          order_violations = 0
          prev_at = None
          first_3_keys: list = []
          first_3_ig_keys: list = []
          candidate_cid_fields: Counter = Counter()
          candidate_score_fields: Counter = Counter()
          candidate_bucket_fields: Counter = Counter()
          candidate_ts_fields: Counter = Counter()
          mapping_evidence = {
              "meaningful_classification_paper_ready": 0,
              "meaningful_classification_exploratory_pass": 0,
              "outcome_completed_with_candidates": 0,
              "event_type_duplicate_detected": 0,
              "event_type_duplicate_spawn_rejected": 0,
              "event_type_campaign_failed": 0,
              "reason_code_present_non_none": 0,
              "any_score_like_scalar_field_present": 0,
          }

          def _is_ig_relevant(ev: dict) -> bool:
              mc = ev.get("meaningful_classification")
              if mc in ("paper_ready", "exploratory_pass"):
                  return True
              if ev.get("outcome") == "completed_with_candidates":
                  return True
              et = ev.get("event_type")
              if et in (
                  "duplicate_detected",
                  "duplicate_spawn_rejected",
                  "campaign_failed",
              ):
                  return True
              return False

          present = LEDGER.is_file()
          file_size = LEDGER.stat().st_size if present else 0

          if present:
              try:
                  with LEDGER.open("r", encoding="utf-8") as fh:
                      for raw in fh:
                          line_count += 1
                          if line_count > MAX_LINES:
                              truncated = True
                              line_count -= 1
                              break
                          stripped = raw.strip()
                          if not stripped:
                              continue
                          try:
                              ev = json.loads(stripped)
                          except json.JSONDecodeError:
                              malformed_line_count += 1
                              continue
                          if not isinstance(ev, dict):
                              malformed_line_count += 1
                              continue
                          parsed_line_count += 1

                          if len(first_3_keys) < 3:
                              first_3_keys.append(sorted(ev.keys()))

                          for fld in PROBE_CID_FIELDS:
                              if fld in ev:
                                  candidate_cid_fields[fld] += 1
                          for fld in PROBE_SCORE_FIELDS:
                              if fld in ev:
                                  candidate_score_fields[fld] += 1
                          for fld in PROBE_BUCKET_FIELDS:
                              if fld in ev:
                                  candidate_bucket_fields[fld] += 1
                          for fld in PROBE_TS_FIELDS:
                              if fld in ev:
                                  candidate_ts_fields[fld] += 1

                          et = ev.get("event_type")
                          if isinstance(et, str):
                              event_type_counter[et] += 1
                          mc = ev.get("meaningful_classification")
                          if mc is None:
                              meaningful_counter["__null__"] += 1
                          elif isinstance(mc, str):
                              meaningful_counter[mc] += 1
                          outcome = ev.get("outcome")
                          if outcome is None:
                              outcome_counter["__null__"] += 1
                          elif isinstance(outcome, str):
                              outcome_counter[outcome] += 1
                          rc = ev.get("reason_code")
                          if isinstance(rc, str):
                              reason_code_counter[rc] += 1

                          cid = ev.get("campaign_id")
                          if isinstance(cid, str) and cid:
                              events_per_campaign[cid] += 1

                          if _is_ig_relevant(ev):
                              ig_relevant_event_count += 1
                              if isinstance(cid, str) and cid:
                                  ig_relevant_per_campaign.add(cid)
                              if len(first_3_ig_keys) < 3:
                                  first_3_ig_keys.append(sorted(ev.keys()))

                          at = ev.get("at_utc")
                          if at is None:
                              missing_at_utc_count += 1
                          elif isinstance(at, str):
                              if oldest_at is None or at < oldest_at:
                                  oldest_at = at
                              if newest_at is None or at > newest_at:
                                  newest_at = at
                              if prev_at is not None and at < prev_at:
                                  order_violations += 1
                              prev_at = at
                          else:
                              malformed_at_utc_count += 1

                          if mc == "paper_ready":
                              mapping_evidence["meaningful_classification_paper_ready"] += 1
                          elif mc == "exploratory_pass":
                              mapping_evidence["meaningful_classification_exploratory_pass"] += 1
                          if outcome == "completed_with_candidates":
                              mapping_evidence["outcome_completed_with_candidates"] += 1
                          if et == "duplicate_detected":
                              mapping_evidence["event_type_duplicate_detected"] += 1
                          elif et == "duplicate_spawn_rejected":
                              mapping_evidence["event_type_duplicate_spawn_rejected"] += 1
                          elif et == "campaign_failed":
                              mapping_evidence["event_type_campaign_failed"] += 1
                          if isinstance(rc, str) and rc and rc != "none":
                              mapping_evidence["reason_code_present_non_none"] += 1
                          for fld in PROBE_SCORE_FIELDS:
                              if fld in ev:
                                  mapping_evidence["any_score_like_scalar_field_present"] += 1
                                  break
              except OSError as e:
                  # Defensive: never raise from the diagnostic.
                  malformed_line_count = -1  # signal read error

          def _bucket(n: int) -> str:
              if n == 1:
                  return "1"
              if n == 2:
                  return "2"
              if n <= 5:
                  return "3-5"
              if n <= 10:
                  return "6-10"
              return "11+"

          events_per_campaign_histogram: Counter = Counter(
              _bucket(c) for c in events_per_campaign.values()
          )

          diag = {
              "schema_version": "1.0",
              "report_kind": "intelligent_routing_ig_ledger_shape_diagnostic",
              "ledger_path": str(LEDGER),
              "present": present,
              "file_size_bytes": file_size,
              "max_lines_scanned": MAX_LINES,
              "line_count": line_count,
              "parsed_line_count": parsed_line_count,
              "malformed_line_count": malformed_line_count,
              "truncated": truncated,
              "event_type_distribution": dict(event_type_counter),
              "meaningful_classification_distribution": dict(meaningful_counter),
              "outcome_distribution": dict(outcome_counter),
              "reason_code_distribution_top20": dict(
                  reason_code_counter.most_common(20)
              ),
              "unique_campaign_id_count": len(events_per_campaign),
              "events_per_campaign_histogram": dict(events_per_campaign_histogram),
              "campaigns_with_ig_relevant_event_count": len(ig_relevant_per_campaign),
              "ig_relevant_event_count": ig_relevant_event_count,
              "oldest_event_at_utc": oldest_at,
              "newest_event_at_utc": newest_at,
              "events_in_at_utc_ascending_order": (order_violations == 0),
              "missing_at_utc_count": missing_at_utc_count,
              "malformed_at_utc_count": malformed_at_utc_count,
              "first_3_event_keys_only": first_3_keys,
              "first_3_ig_relevant_event_keys_only": first_3_ig_keys,
              "candidate_campaign_id_fields_seen": dict(candidate_cid_fields),
              "candidate_score_fields_seen": dict(candidate_score_fields),
              "candidate_bucket_fields_seen": dict(candidate_bucket_fields),
              "candidate_timestamp_fields_seen": dict(candidate_ts_fields),
              "mapping_evidence": mapping_evidence,
          }

          OUT.write_text(
              json.dumps(diag, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(f"wrote: {OUT}")
          PY

          # Post-snapshot frozen contracts.
          echo "FROZEN_AFTER_BEGIN"
          for f in research/research_latest.json research/strategy_matrix.csv; do
            if [ -f "$f" ]; then
              printf '%s  %s\n' "$(sha256sum "$f" | cut -d ' ' -f 1)" "$f"
            else
              printf 'absent  %s\n' "$f"
            fi
          done
          echo "FROZEN_AFTER_END"

          # Post-CLI git status snapshot.
          echo "GIT_STATUS_POST_BEGIN"
          post_status="$(git status --short || true)"
          printf '%s\n' "${post_status}"
          echo "GIT_STATUS_POST_END"

          # Hard fail on any tracked-file modification.
          if ! git diff --quiet HEAD --; then
            echo "FAIL: tracked files modified during observation"
            exit 2
          fi

          # Compute NEW untracked entries (post minus pre) and fail
          # if any new entry lives outside the two allowed log
          # directories. comm -13 prints lines unique to file 2
          # (post). Both inputs are sorted for stable comparison.
          new_entries="$(comm -13 \
            <(printf '%s\n' "${pre_status}" | sort -u) \
            <(printf '%s\n' "${post_status}" | sort -u) \
            | grep -v '^$' || true)"
          if [ -n "${new_entries}" ]; then
            unexpected="$(printf '%s\n' "${new_entries}" \
              | grep -vE '^\?\? logs/intelligent_routing(/|_status/)' \
              || true)"
            if [ -n "${unexpected}" ]; then
              echo "FAIL: unexpected new untracked files during observation:"
              printf '%s\n' "${unexpected}"
              exit 3
            fi
          fi

          # Stream artifact contents back via stdout for the runner
          # to extract and upload as a workflow artifact. The
          # metadata-shape diagnostic is optional — included when
          # present, omitted gracefully when absent.
          python3 - <<'PY'
          from pathlib import Path

          required = [
              Path("logs/intelligent_routing/latest.json"),
              Path("logs/intelligent_routing_status/latest.json"),
          ]
          optional = [
              Path("logs/intelligent_routing/metadata_shape_diagnostic.json"),
              Path("logs/intelligent_routing/ig_ledger_shape_diagnostic.json"),
          ]
          for p in required:
              if not p.exists():
                  raise SystemExit(f"missing expected artifact: {p}")
              print(f"ARTIFACT_BEGIN {p}")
              print(p.read_text(encoding="utf-8"))
              print(f"ARTIFACT_END {p}")
          for p in optional:
              if not p.exists():
                  continue
              print(f"ARTIFACT_BEGIN {p}")
              print(p.read_text(encoding="utf-8"))
              print(f"ARTIFACT_END {p}")
          PY
          REMOTE_EOF

      - name: Extract artifacts from SSH stdout
        run: |
          set -euo pipefail
          mkdir -p artifacts/logs/intelligent_routing
          mkdir -p artifacts/logs/intelligent_routing_status
          python3 - <<'PY'
          import re
          from pathlib import Path

          src = Path("artifacts/remote_stdout.txt").read_text(encoding="utf-8")
          # Pull every ARTIFACT_BEGIN/END pair. The path label echoed
          # by the remote script appears on both fences; use it as
          # the back-reference target so the regex cannot match
          # across mismatched begin/end markers.
          pattern = re.compile(
              r"ARTIFACT_BEGIN\s+(?P<path>\S+)\s*\n"
              r"(?P<body>.*?)\n?"
              r"ARTIFACT_END\s+(?P=path)",
              re.DOTALL,
          )
          blocks = list(pattern.finditer(src))
          # Two required artifacts (routing + status) are mandatory;
          # up to two optional diagnostics may follow
          # (metadata-shape, ig-ledger-shape). Accept 2-4 blocks;
          # reject anything outside that range.
          if len(blocks) not in (2, 3, 4):
              raise SystemExit(
                  f"expected 2, 3, or 4 artifact blocks, got {len(blocks)}"
              )
          for m in blocks:
              path = m.group("path")
              body = m.group("body")
              out = Path("artifacts") / path
              out.parent.mkdir(parents=True, exist_ok=True)
              out.write_text(body, encoding="utf-8")
              print(f"extracted: {out}")
          PY

      - name: Verify frozen-contract drift on remote
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          src = Path("artifacts/remote_stdout.txt").read_text(encoding="utf-8")

          def section(label: str) -> dict[str, str]:
              start_marker = f"FROZEN_{label}_BEGIN"
              end_marker = f"FROZEN_{label}_END"
              if start_marker not in src or end_marker not in src:
                  raise SystemExit(f"missing marker block: {label}")
              start = src.index(start_marker) + len(start_marker)
              end = src.index(end_marker)
              out: dict[str, str] = {}
              for line in src[start:end].splitlines():
                  line = line.strip()
                  if not line or "  " not in line:
                      continue
                  digest, path = line.split("  ", 1)
                  out[path] = digest
              return out

          before = section("BEFORE")
          after = section("AFTER")
          if before != after:
              raise SystemExit(
                  f"FROZEN-CONTRACT DRIFT: before={before!r} "
                  f"after={after!r}"
              )
          print("frozen-contract sha256 unchanged across observation:")
          for path in sorted(before):
              print(f"  {before[path]}  {path}")
          PY

      - name: Upload observation artifacts
        # Always upload — on failure we still want the
        # remote_stdout.txt transcript for post-mortem. The two
        # log JSONs may be missing on failure (extraction step
        # would have skipped); upload-artifact handles per-path
        # absence gracefully when at least one path is present.
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808  # v4.3.3
        with:
          name: v3-15-16-intelligent-routing-observation
          path: |
            artifacts/logs/intelligent_routing/latest.json
            artifacts/logs/intelligent_routing/metadata_shape_diagnostic.json
            artifacts/logs/intelligent_routing/ig_ledger_shape_diagnostic.json
            artifacts/logs/intelligent_routing_status/latest.json
            artifacts/remote_stdout.txt
          retention-days: 14
          if-no-files-found: warn

      - name: Wipe SSH artifacts
        if: always()
        run: |
          set -euo pipefail
          rm -f ~/.ssh/observe_key ~/.ssh/known_hosts || true
