name: Build & Push Docker Image

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION_VALUE="$(tr -d '\r\n' < VERSION)"
          echo "version=$VERSION_VALUE" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION_VALUE"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/roudjy/trading-agent-dashboard:latest
            ghcr.io/roudjy/trading-agent-dashboard:${{ steps.version.outputs.version }}

      - name: Build & push agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/roudjy/trading-agent-agent:latest
            ghcr.io/roudjy/trading-agent-agent:${{ steps.version.outputs.version }}