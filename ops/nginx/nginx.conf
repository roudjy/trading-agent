worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---------------------------------------------------------------------
    # Known AI / crawler user agents. Block at the reverse-proxy layer so
    # the Flask app + React bundle never run for them. ADR-011 §3.
    # ---------------------------------------------------------------------
    map $http_user_agent $block_ua {
        default 0;
        "~*GPTBot"                1;
        "~*ChatGPT-User"          1;
        "~*OAI-SearchBot"         1;
        "~*ClaudeBot"             1;
        "~*anthropic-ai"          1;
        "~*Claude-Web"            1;
        "~*CCBot"                 1;
        "~*Google-Extended"       1;
        "~*Bytespider"            1;
        "~*PerplexityBot"         1;
        "~*cohere-ai"             1;
        "~*Amazonbot"             1;
        "~*Applebot-Extended"     1;
        "~*FacebookBot"           1;
        "~*meta-externalagent"    1;
        "~*ImagesiftBot"          1;
        "~*DataForSeoBot"         1;
        "~*Diffbot"               1;
        "~*YouBot"                1;
        "~*AwarioBot"             1;
    }

    # Upstream: Flask dashboard inside the compose network. Port 8050 is
    # only exposed on this internal network; the host-facing port lives on
    # this nginx service.
    upstream dashboard_upstream {
        server dashboard:8050;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Anti-indexing (first-line defence; Flask repeats on the SPA).
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        # Block AI / crawler UAs. 403 — not "no results", so any accidental
        # public surface is clearly rejected.
        if ($block_ua) {
            return 403 "crawlers are not welcome here\n";
        }

        client_max_body_size 2m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        location = /robots.txt {
            root /usr/share/nginx/html;
            add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
            default_type text/plain;
        }

        location / {
            proxy_pass http://dashboard_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Preserve the Flask session cookie + operator token.
            proxy_pass_header Authorization;
            proxy_pass_header Set-Cookie;
        }
    }
}
